<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kontakt – Lars‑Erik</title>
<style>
body { font-family: Arial; padding: 40px; background: #f0f0f0; transition: 0.4s; }
body.dark { background: #121212; color: #e0e0e0; }
#darkToggle { position: fixed; top: 20px; right: 20px; background: #222; color: white; padding: 10px; cursor: pointer; }
input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #aaa; }
button { padding: 12px 20px; background: #222; color: white; border: none; border-radius: 6px; cursor: pointer; }
button:hover { opacity: 0.8; }
</style>
</head>
<body>

<div id="darkToggle">Dark Mode</div>

<script>
document.getElementById("darkToggle").onclick = () => {
    document.body.classList.toggle("dark");
};
</script>

<h1>Kontakt</h1>
<p>Hier kannst du mich erreichen.</p>

<form>
    <label>Name</label>
    <input type="text">

    <label>E‑Mail</label>
    <input type="email">

    <label>Nachricht</label>
    <textarea rows="6"></textarea>

    <button>Senden</button>
</form>

<p><a href="index.html">Zurück zur Startseite</a></p>

</body>
</html>
