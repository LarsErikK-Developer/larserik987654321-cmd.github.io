<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lars‑Erik – Startseite</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #e5e7eb;
}

/* NAV */
nav {
    background: rgba(255,255,255,0.05);
    padding: 14px 40px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(12px);
}

nav a {
    color: #38bdf8;
    text-decoration: none;
    margin-left: 20px;
}

/* CHAT */
.chat-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    width: 80%;
    margin: 40px auto;
    height: 400px;
    overflow-y: auto;
}

input, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

#nameInput {
    width: 200px;
}

#msgInput {
    width: 70%;
}

#sendBtn {
    background: #38bdf8;
    color: #0f172a;
    cursor: pointer;
}
</style>
</head>
<body>

<nav>
    <div><strong>Lars‑Erik</strong></div>
    <div>
        <a href="login.html">Admin Login</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</nav>

<h1 style="text-align:center;">Willkommen auf der Webseite</h1>
<p style="text-align:center;">Gib dir einen Namen und chatte mit anderen Besuchern.</p>

<div style="text-align:center;">
    <input id="nameInput" placeholder="Dein Name">
    <button onclick="setName()">Setzen</button>
</div>

<div class="chat-box" id="chat"></div>

<div style="text-align:center;">
    <input id="msgInput" placeholder="Nachricht">
    <button id="sendBtn" onclick="sendMsg()">Senden</button>
</div>

<script>
let username = localStorage.getItem("chatName") || "Gast";

function setName() {
    const n = document.getElementById("nameInput").value.trim();
    if (n.length > 0) {
        username = n;
        localStorage.setItem("chatName", n);
        alert("Name gesetzt: " + n);
    }
}

function sendMsg() {
    const msg = document.getElementById("msgInput").value.trim();
    if (!msg) return;

    let chat = JSON.parse(localStorage.getItem("chat") || "[]");
    chat.push({ user: username, text: msg, time: new Date().toLocaleTimeString() });
    localStorage.setItem("chat", JSON.stringify(chat));

    document.getElementById("msgInput").value = "";
    loadChat();
}

function loadChat() {
    const chat = JSON.parse(localStorage.getItem("chat") || "[]");
    const box = document.getElementById("chat");
    box.innerHTML = "";

    chat.forEach(m => {
        box.innerHTML += `<p><strong>${m.user}</strong> (${m.time}): ${m.text}</p>`;
    });

    box.scrollTop = box.scrollHeight;
}

loadChat();
setInterval(loadChat, 1000);
</script>

</body>
</html>
