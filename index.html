<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lars‑Erik – Startseite</title>

<style>
:root {
    --accent: #38bdf8;
    --accent-soft: rgba(56, 189, 248, 0.2);
    --bg-dark: #020617;
    --bg-light: #f3f4f6;
    --text-dark: #e5e7eb;
    --text-light: #111827;
}

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text-dark);
    transition: background 0.4s, color 0.4s;
}

body.light {
    background: var(--bg-light);
    color: var(--text-light);
}

/* NAVIGATION */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 14px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(18px);
    background: rgba(15, 23, 42, 0.85);
    border-bottom: 1px solid rgba(148, 163, 184, 0.3);
    z-index: 1000;
}

nav a {
    color: var(--text-dark);
    margin-left: 20px;
    text-decoration: none;
    font-size: 15px;
}

nav a:hover {
    color: var(--accent);
}

#modeToggle {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.6);
    background: transparent;
    color: var(--text-dark);
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 80px;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
    opacity: 0.8;
}

/* BADGES */
.badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    margin-top: 20px;
    font-size: 14px;
    font-weight: bold;
}

.admin {
    background: #38bdf8;
    color: #0f172a;
}

.user {
    background: #4ade80;
    color: #064e3b;
}

.visitor-count {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}

/* BUTTONS */
.btn {
    padding: 12px 20px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    font-size: 16px;
}

.btn:hover {
    transform: translateY(-2px);
}
</style>
</head>
<body>

<nav>
    <div><strong>Lars‑Erik</strong></div>
    <div>
        <a href="login.html">Login</a>
        <a href="dashboard.html">Dashboard</a>
        <button id="modeToggle">Dark Mode</button>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Willkommen auf meiner Webseite</h1>
        <p>Developer • Creator • Innovator</p>

        <div id="roleBadge"></div>
        <div id="visitorInfo" class="visitor-count"></div>

        <div id="actionButtons"></div>
    </div>
</section>

<script>
/* DARK MODE */
const modeToggle = document.getElementById("modeToggle");
modeToggle.onclick = () => {
    document.body.classList.toggle("light");
    modeToggle.textContent = document.body.classList.contains("light")
        ? "Dark Mode"
        : "Light Mode";
};

/* LOGIN STATUS */
const role = localStorage.getItem("role");
const badge = document.getElementById("roleBadge");
const actions = document.getElementById("actionButtons");
const visitorInfo = document.getElementById("visitorInfo");

if (role === "admin") {
    badge.innerHTML = "<div class='badge admin'>Admin</div>";
    actions.innerHTML = `
        <button class="btn" onclick="location.href='dashboard.html'">Admin-Dashboard</button>
        <button class="btn" onclick="location.href='server.html'">Server-Konsole</button>
        <button class="btn" onclick="logout()">Logout</button>
    `;
} else if (role === "user") {
    badge.innerHTML = "<div class='badge user'>User</div>";
    actions.innerHTML = `
        <button class="btn" onclick="location.href='dashboard.html'">User-Dashboard</button>
        <button class="btn" onclick="logout()">Logout</button>
    `;
} else {
    badge.innerHTML = "<div class='badge' style='background:#475569;'>Gast</div>";
    actions.innerHTML = `
        <button class="btn" onclick="location.href='login.html'">Login</button>
    `;
}

/* VISITOR COUNTER */
const visitors = JSON.parse(localStorage.getItem("visitors") || "[]");
visitorInfo.innerText = "Besucher gespeichert: " + visitors.length;

/* LOGOUT */
function logout() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
}
</script>

</body>
</html>
