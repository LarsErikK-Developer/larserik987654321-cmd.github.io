<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login – Geschützter Bereich</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 16px;
    backdrop-filter: blur(12px);
    width: 320px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
}

#error {
    margin-top: 12px;
    color: #f87171;
    display: none;
}
</style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Benutzername">
    <input type="password" id="pw" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <div id="error">Falsche Daten!</div>
</div>

<script>
function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pw").value.trim();

    const users = {
        "admin": "admin123",
        "lars": "passwort",
        "user": "1234"
    };

    if (users[u] && users[u] === p) {

        let visitors = JSON.parse(localStorage.getItem("visitors") || "[]");
        visitors.push({ name: u, time: new Date().toLocaleString() });
        localStorage.setItem("visitors", JSON.stringify(visitors));

        localStorage.setItem("role", u === "admin" ? "admin" : "user");

        window.location.href = "dashboard.html";
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
