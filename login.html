<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
}
</style>
</head>
<body>

<div class="box">
    <h2>Admin Login</h2>
    <input id="user" placeholder="Benutzername"><br>
    <input id="pw" type="password" placeholder="Passwort"><br>
    <button onclick="login()">Login</button>
    <p id="err" style="color:red; display:none;">Falsche Daten!</p>
</div>

<script>
function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pw").value.trim();

    const users = {
        "admin": "admin123"
    };

    if (users[u] && users[u] === p) {
        localStorage.setItem("role", "admin");
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("err").style.display = "block";
    }
}
</script>

</body>
</html>
